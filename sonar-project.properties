# SonarCloud / SonarQube configuration for WegaMacUpdater.
# projectKey / organization confirmed against the SonarCloud project.
sonar.projectKey=DominikSienkiewicz_WegaMacUpdater
sonar.organization=dominiksienkiewicz
sonar.host.url=https://sonarcloud.io

sonar.sources=Sources
sonar.tests=Tests

# --- Code coverage ---
#
# SonarCloud cannot run our macOS XCTest suite, so without an uploaded report it
# sees the new code but has zero coverage data and reports 0.0% — failing the
# "Sonar way" gate (≥ 80% coverage on new code). The CI `build-test` job runs the
# tests with coverage, converts SwiftPM's llvm-cov output to this generic report
# (scripts/coverage-sonarqube.sh) and hands it to the SonarCloud job as an
# artifact. Path is relative to the repo root (sonar.projectBaseDir).
sonar.coverageReportPaths=sonarqube-generic-coverage.xml

# Files deliberately kept out of the coverage metric (they are NOT excluded from
# issue analysis — only from "lines to cover"):
#
#   * Sources/MacUpdater/**   — the SwiftUI app. This is an `executableTarget`
#     (see Package.swift); the XCTest bundle depends only on the MacUpdaterCore
#     library and *cannot* `@testable import` an executable, so no unit test can
#     reach these files regardless of effort. The pure logic is therefore lifted
#     out into MacUpdaterCore's planners (UpdatePlanner, MigrationPlanner, …),
#     which ARE covered; what remains here is SwiftUI glue. Counting its lines as
#     "uncovered" would measure that structural boundary, not a real test gap.
#     Raising real coverage means moving more logic down into Core (and testing
#     it there), not un-excluding unreachable view code.
#   * **/SystemPaths.swift    — a table of `static let` system-path constants
#     with no executable statements. There is nothing to unit-test, and llvm-cov
#     emits no line records for it.
sonar.coverage.exclusions=Sources/MacUpdater/**,**/SystemPaths.swift

# --- S1075 "URIs should not be hard-coded" ---
#
# Wega's outbound URLs are now sourced from a customizable parameter
# (Resources/endpoints.json, decoded by AppEndpoints), so the genuinely
# configurable endpoints no longer trip S1075. Two categories remain hard-coded
# by design and have no configurable alternative — exclude them so the rule
# reports only real findings:
#
#   * Tests/**            — fixtures and expected values are deliberately inline.
#   * SystemPaths.swift   — the fixed macOS/Homebrew paths Wega shells out to.
#   * TouchIDSudoConfigurator.swift / SudoShim.swift — embedded shell scripts
#     that reference /usr/bin/sudo and /etc/pam.d/sudo_local by absolute path;
#     sourcing these from a writable file would be a privilege-escalation vector.
# --- S107 "Functions should not have too many parameters" ---
#
# Models.swift holds flat domain value types (e.g. ApplicationInfo, 10 cohesive
# fields). A public memberwise-style initializer must list every field; splitting
# the model into sub-structs purely to satisfy the 7-parameter threshold would
# ripple through every construction and access site for no real readability gain.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5
sonar.issue.ignore.multicriteria.e1.ruleKey=swift:S1075
sonar.issue.ignore.multicriteria.e1.resourceKey=Tests/**/*
sonar.issue.ignore.multicriteria.e2.ruleKey=swift:S1075
sonar.issue.ignore.multicriteria.e2.resourceKey=**/SystemPaths.swift
sonar.issue.ignore.multicriteria.e3.ruleKey=swift:S1075
sonar.issue.ignore.multicriteria.e3.resourceKey=**/TouchIDSudoConfigurator.swift
sonar.issue.ignore.multicriteria.e4.ruleKey=swift:S1075
sonar.issue.ignore.multicriteria.e4.resourceKey=**/SudoShim.swift
sonar.issue.ignore.multicriteria.e5.ruleKey=swift:S107
sonar.issue.ignore.multicriteria.e5.resourceKey=**/Models.swift
